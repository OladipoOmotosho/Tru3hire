# Required when using a custom service account: specify logging behavior
options:
  logging: CLOUD_LOGGING_ONLY

steps:
  # Build the container image
  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "build",
        "-t",
        "gcr.io/$PROJECT_ID/truehire-api:$COMMIT_SHA",
        "-f",
        "packages/backend/Dockerfile",
        "packages/backend",
      ]

  # Push the container image to Container Registry
  - name: "gcr.io/cloud-builders/docker"
    args: ["push", "gcr.io/$PROJECT_ID/truehire-api:$COMMIT_SHA"]

  # Deploy container image to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "truehire-api"
      - "--image"
      - "gcr.io/$PROJECT_ID/truehire-api:$COMMIT_SHA"
      - "--region"
      - "us-central1"
      - "--platform"
      - "managed"
      - "--allow-unauthenticated"
      - "--memory"
      - "1Gi"
      - "--cpu"
      - "1"
      - "--timeout"
      - "300s"
      - "--concurrency"
      - "80"
      - "--min-instances"
      - "1"
      - "--set-env-vars"
      - "ENVIRONMENT=production"
      - "--set-secrets"
      - "DATABASE_URL=DATABASE_URL:latest,OPENAI_API_KEY=OPENAI_API_KEY:latest,CLERK_ISSUER_URL=CLERK_ISSUER_URL:latest"
images:
  - "gcr.io/$PROJECT_ID/truehire-api:$COMMIT_SHA"
