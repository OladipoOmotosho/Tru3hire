# Required when using a custom service account: specify logging behavior
options:
  logging: CLOUD_LOGGING_ONLY

steps:
  # Build the container image
  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "build",
        "-t",
        "gcr.io/$PROJECT_ID/truehire-api:$COMMIT_SHA",
        "-f",
        "packages/backend/Dockerfile",
        "packages/backend",
      ]

  # Push the container image to Container Registry
  - name: "gcr.io/cloud-builders/docker"
    args: ["push", "gcr.io/$PROJECT_ID/truehire-api:$COMMIT_SHA"]

  # Deploy container image to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "truehire-api"
      - "--image"
      - "gcr.io/$PROJECT_ID/truehire-api:$COMMIT_SHA"
      - "--region"
      - "us-central1"
      - "--platform"
      - "managed"
      - "--allow-unauthenticated"
      - "--memory"
      - "2Gi"
      - "--port"
      - "8080"
      - "--cpu"
      - "1"
      - "--timeout"
      - "900s"
      - "--concurrency"
      - "80"
      # Scale to zero when idle: a pre-revenue app should not pay for an
      # always-on instance (min-instances=1 at 2Gi ≈ $45-70/mo even with no
      # traffic). Trade-off: ~2-5s cold start on the first request after idle.
      # Raise this only when steady traffic or a latency SLO justifies the cost.
      - "--min-instances"
      - "0"
      - "--set-env-vars"
      - "ENVIRONMENT=production"
      # GEMINI_API_KEY replaced stale OPENAI_API_KEY (code reads GEMINI_API_KEY/GOOGLE_API_KEY only).
      # One-time setup: create the secret + grant the runtime service account access — see
      # documentation/public/TechnicalReadMe.md "Deployment" section.
      - "--set-secrets"
      - "DATABASE_URL=DATABASE_URL:latest,GEMINI_API_KEY=GEMINI_API_KEY:latest,CLERK_ISSUER_URL=CLERK_ISSUER_URL:latest,ADZUNA_APP_ID=ADZUNA_APP_ID:latest,ADZUNA_APP_KEY=ADZUNA_APP_KEY:latest"
      # Startup probe → /health/ready (real DB + model checks). Configured once on the
      # service (persists across deploys):
      #   gcloud run services update truehire-api --region us-central1 \
      #     --startup-probe httpGet.path=/health/ready,httpGet.port=8080,initialDelaySeconds=10,periodSeconds=10,failureThreshold=6
images:
  - "gcr.io/$PROJECT_ID/truehire-api:$COMMIT_SHA"
