# Render.com Deployment Configuration
# This file tells Render how to build and run your backend

services:
  - type: web
    name: truehire-api
    runtime: python
    region: oregon # Free tier region
    plan: free

    # Build commands
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT

    # Root directory for the backend
    rootDir: packages/backend

    # Environment variables
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      # IMPORTANT: Set DATABASE_URL in Render dashboard after creating PostgreSQL database
      # This can be done manually or by creating a Render PostgreSQL database and linking it
      # Example: DATABASE_URL=postgresql://user:pass@host:5432/dbname

    # Health check endpoint
    healthCheckPath: /health

    # Auto-deploy on git push
    autoDeploy: true
