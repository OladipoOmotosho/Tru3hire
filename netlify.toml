[build]
  base = "."
  command = "yarn install --frozen-lockfile && yarn workspace frontend build"
  publish = "packages/frontend/dist"

[build.environment]
  NODE_VERSION = "22"
  NPM_FLAGS = "--legacy-peer-deps"
  SECRETS_SCAN_ENABLED = "false"
  # After deploying to Render, set this in Netlify Dashboard > Site Settings > Environment Variables
  # VITE_API_URL = "https://your-app.onrender.com"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200