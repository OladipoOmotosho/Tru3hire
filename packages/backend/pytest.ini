[pytest]
# Tests import `from app...` / `from main import app`, so packages/backend must
# be on sys.path. `pythonpath = .` makes this work under a bare `pytest`
# invocation (e.g. CI), not just `python -m pytest`.
testpaths = tests
pythonpath = .
asyncio_mode = strict
markers =
    external: tests that hit live external services (Gemini/Adzuna). Excluded in CI via -m "not external".
